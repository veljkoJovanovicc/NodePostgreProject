name: CD Pipeline

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug SSH
        run: |
          echo "IP: ${{ secrets.SERVER_IP }}"
          ping -c 1 ${{ secrets.SERVER_IP }} || true
          ssh-keyscan -H ${{ secrets.SERVER_IP }} || true

      # 2. Deploy to server
      - name: Deploy via SSH
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} "
            cd ~/app || git clone https://github.com/veljkoJovanovicc/NodePostgreProject.git app &&
            cd app &&
            git pull &&
            docker compose down || true &&
            docker compose up -d --build
          "